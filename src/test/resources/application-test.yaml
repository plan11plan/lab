spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lab?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: lab
    password: lab
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 4
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
